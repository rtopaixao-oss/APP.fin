<ion-header>
  <ion-toolbar color="warning">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/menu"></ion-back-button>
    </ion-buttons>
    <ion-title>Contas a Pagar</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="floating">Fornecedor</ion-label>
    <ion-input [(ngModel)]="fornecedor"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Vencimento</ion-label>
    <ion-input [(ngModel)]="vencimento" placeholder="Ex: 10/04/2026"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Pagamento</ion-label>
    <ion-input [(ngModel)]="pagamento" placeholder="Ex: 08/04/2026"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Valor</ion-label>
    <ion-input [(ngModel)]="valor" placeholder="Ex: 150,00"></ion-input>
  </ion-item>

  <ion-button expand="block" color="warning" (click)="cadastrar()">
    Cadastrar
  </ion-button>

  <ion-list>
    <ion-list-header>
      <ion-label>Contas a pagar</ion-label>
    </ion-list-header>
    <ion-item *ngFor="let item of listaPagar; let i = index">
      <ion-label>
        <h2>{{ item.fornecedor }}</h2>
        <p>
          Vencimento: {{ item.vencimento }} — Pagamento: {{ item.pagamento }} — Valor:
          {{ item.valor }}
        </p>
      </ion-label>
      <ion-button slot="end" color="danger" size="small" (click)="excluir(i)">
        Excluir
      </ion-button>
    </ion-item>
  </ion-list>
</ion-content>
